<div class="fade-in">
    <div class="header-actions">
        <h2 class="section-title">Gestión de Proyectos</h2>
    </div>

    <div class="alert alert-error" *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="alert alert-success" *ngIf="successMsg">{{ successMsg }}</div>

    <div class="grid-layout">
        <!-- Lista de Proyectos -->
        <div class="card glass-panel flex-2">
            <div class="card-header">
                <h3>Proyectos (Mapeo de Fireflies)</h3>
            </div>
            <div class="card-body p-0">
                <div class="table-container" *ngIf="isLoading">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>
                                    <div class="skeleton skeleton-text" style="width: 40px;"></div>
                                </th>
                                <th>
                                    <div class="skeleton skeleton-text" style="width: 150px;"></div>
                                </th>
                                <th>
                                    <div class="skeleton skeleton-text" style="width: 200px;"></div>
                                </th>
                                <th>
                                    <div class="skeleton skeleton-text" style="width: 80px;"></div>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let i of [1,2,3]">
                                <td>
                                    <div class="skeleton skeleton-text" style="width: 30px;"></div>
                                </td>
                                <td>
                                    <div class="skeleton skeleton-title" style="margin-bottom: 0;"></div>
                                </td>
                                <td>
                                    <div class="skeleton skeleton-text" style="width: 180px;"></div>
                                </td>
                                <td>
                                    <div class="skeleton skeleton-text" style="width: 80px; height: 32px;"></div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="table-container" *ngIf="!isLoading">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nombre de Captura</th>
                                <th>Descripción</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let p of projects">
                                <td>#{{ p.id }}</td>
                                <td><span class="badge">{{ p.name }}</span></td>
                                <td>{{ p.description || 'N/A' }}</td>
                                <td>
                                    <button class="btn btn-sm btn-icon-text">
                                        Detalles
                                    </button>
                                </td>
                            </tr>
                            <tr *ngIf="projects.length === 0">
                                <td colspan="4" class="p-0">
                                    <div class="empty-state">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                                            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                                        </svg>
                                        <h4>No hay proyectos creados</h4>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Creador de Proyectos -->
        <div class="card glass-panel flex-1">
            <div class="card-header">
                <h3>Nuevo Proyecto</h3>
            </div>
            <div class="card-body">
                <form (ngSubmit)="createProject()" #projectForm="ngForm">
                    <div class="form-group">
                        <label>Nombre Identificador <span class="text-danger">*</span></label>
                        <input type="text" name="name" [(ngModel)]="newProject.name" required
                            placeholder="ej: Reclutamiento" />
                    </div>

                    <div class="form-group">
                        <label>Descripción</label>
                        <textarea name="description" [(ngModel)]="newProject.description" rows="3"
                            placeholder="Contexto del proyecto..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-full"
                        [disabled]="!projectForm.form.valid || isCreating">
                        <span *ngIf="!isCreating">Crear Proyecto Space</span>
                        <span *ngIf="isCreating">Procesando...</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
