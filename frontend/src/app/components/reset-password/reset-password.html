<div class="login-page fade-in">
    <div class="login-card glass-panel">
        <div class="logo-container">
            <h2>Secretaría <span>AI</span></h2>
            <p>Crear Nueva Contraseña</p>
        </div>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="!successMessage && token">
            <p class="instruction-text">Por favor, ingresa tu nueva contraseña segura.</p>
            
            <div class="form-group">
                <label for="newPassword">Nueva Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="newPassword" name="newPassword" [(ngModel)]="newPassword" required minlength="6"
                        placeholder="••••••••" />
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Nueva Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmPassword" required minlength="6"
                        placeholder="••••••••" />
                </div>
            </div>

            <div class="error-msg" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="!resetForm.form.valid || isLoading">
                <span *ngIf="!isLoading">Guardar Contraseña</span>
                <span *ngIf="isLoading">Guardando...</span>
            </button>
        </form>

        <div *ngIf="successMessage" class="success-container">
            <div class="success-icon">✓</div>
            <h3>¡Contraseña Actualizada!</h3>
            <p>{{ successMessage }}</p>
            <div class="button-container mt-4">
                <a routerLink="/login" class="btn btn-primary" style="display:inline-block; text-decoration:none;">Ir al Inicio de Sesión</a>
            </div>
        </div>

        <div *ngIf="!token && errorMessage" class="error-container" style="text-align: center; padding: 1rem 0;">
            <div class="error-msg" style="margin-bottom: 20px;">
                {{ errorMessage }}
            </div>
            <a routerLink="/forgot-password" class="btn btn-secondary">Solicitar enlace nuevo</a>
            <div class="back-link mt-4" style="margin-top: 15px;">
                <a routerLink="/login">Ir a inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
