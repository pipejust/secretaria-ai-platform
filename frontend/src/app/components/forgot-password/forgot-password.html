<div class="login-page fade-in">
    <div class="login-card glass-panel">
        <div class="logo-container">
            <h2>Secretaría <span>AI</span></h2>
            <p>Recuperar Contraseña</p>
        </div>

        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!successMessage">
            <p class="instruction-text">Ingresa tu correo electrónico registrado y te enviaremos un enlace para restablecer tu contraseña.</p>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-wrapper">
                    <input type="email" id="email" name="email" [(ngModel)]="email" required
                        placeholder="tu@correo.com" />
                </div>
            </div>

            <div class="error-msg" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn btn-primary w-full" [disabled]="!forgotForm.form.valid || isLoading">
                <span *ngIf="!isLoading">Enviar Enlace</span>
                <span *ngIf="isLoading">Enviando...</span>
            </button>
            
            <div class="back-link">
                <a routerLink="/login">Volver al inicio de sesión</a>
            </div>
        </form>

        <div *ngIf="successMessage" class="success-container">
            <div class="success-icon">✓</div>
            <h3>¡Correo Enviado!</h3>
            <p>{{ successMessage }}</p>
            <div class="back-link mt-4">
                <a routerLink="/login">Volver al inicio de sesión</a>
            </div>
        </div>
    </div>
</div>
